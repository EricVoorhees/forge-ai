# Render Blueprint - Deploy all FORGE services with one click
# Usage: Go to Render Dashboard → Blueprints → New Blueprint → Connect this repo

databases:
  - name: forge-db
    plan: basic-256mb
    databaseName: forge
    user: forge_user
    region: oregon

services:
  # Redis Cache
  - type: redis
    name: forge-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # FastAPI Backend
  - type: web
    name: forge-api
    runtime: python
    plan: starter
    region: oregon
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: forge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: forge-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "*"
      - key: STRIPE_SECRET_KEY
        value: "placeholder"
      - key: STRIPE_WEBHOOK_SECRET
        value: "placeholder"
      - key: STRIPE_PRICE_STARTER
        value: "placeholder"
      - key: STRIPE_PRICE_PRO
        value: "placeholder"
      - key: STRIPE_PRICE_ENTERPRISE
        value: "placeholder"
      - key: INFERENCE_URL
        value: "https://api.runpod.ai/v2/c7h5q3np80boas"
      - key: RUNPOD_API_KEY
        value: "rpa_MX9WUXA0PD233NF7IDIPGQ9QMPV8ENYNIHMMCC520yo0az"
