# Render Blueprint - FORGE
# API: FastAPI on Render
# Frontend: Next.js on Render
# Database: Neon PostgreSQL
# Redis: Upstash Redis
# Inference: Fireworks.ai (DeepSeek V3.1 671B)

services:
  # Next.js Frontend
  - type: web
    name: forge-web
    runtime: docker
    plan: starter
    region: oregon
    rootDir: web
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://forge-api-a7pi.onrender.com"

  # FastAPI Backend
  - type: web
    name: forge-api
    runtime: docker
    plan: starter
    region: oregon
    rootDir: api
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # Neon PostgreSQL
      - key: DATABASE_URL
        value: "postgresql://neondb_owner:npg_zTMpO0kKBn5h@ep-gentle-cake-ais3bl75-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require"
      # Upstash Redis
      - key: REDIS_URL
        value: "rediss://default:ARBiAAImcDE3MDBkMTNlNWQyMDQ0ZDA1YjI1ZmFiYWVkMzhhYWQ2Y3AxNDE5NA@popular-lioness-4194.upstash.io:6379"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "*"
      - key: STRIPE_SECRET_KEY
        value: "placeholder"
      - key: STRIPE_WEBHOOK_SECRET
        value: "placeholder"
      - key: STRIPE_PRICE_STARTER
        value: "placeholder"
      - key: STRIPE_PRICE_PRO
        value: "placeholder"
      - key: STRIPE_PRICE_ENTERPRISE
        value: "placeholder"
      # Fireworks.ai Inference - DeepSeek V3.1 671B ($0.90/1M tokens, MIT license)
      - key: INFERENCE_URL
        value: "https://api.fireworks.ai/inference/v1"
      - key: FIREWORKS_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: INFERENCE_MODEL
        value: "accounts/fireworks/models/deepseek-v3p1"
