# Render Blueprint - FORGE API
# Database: Fly.io PostgreSQL
# Redis: Fly.io Upstash Redis
# Inference: RunPod

services:
  # FastAPI Backend
  - type: web
    name: forge-api
    runtime: docker
    plan: starter
    region: oregon
    rootDir: api
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # Fly.io PostgreSQL (external connection)
      - key: DATABASE_URL
        value: "postgres://postgres:mmv5iIvRk4MVant@forge-db-prod.fly.dev:5432/postgres?ssl=require"
      # Fly.io Upstash Redis
      - key: REDIS_URL
        value: "rediss://default:dc66d5b7275b48458d5a51ce9572584f@fly-forge-redis-prod.upstash.io:6379"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "*"
      - key: STRIPE_SECRET_KEY
        value: "placeholder"
      - key: STRIPE_WEBHOOK_SECRET
        value: "placeholder"
      - key: STRIPE_PRICE_STARTER
        value: "placeholder"
      - key: STRIPE_PRICE_PRO
        value: "placeholder"
      - key: STRIPE_PRICE_ENTERPRISE
        value: "placeholder"
      # RunPod Inference
      - key: INFERENCE_URL
        value: "https://api.runpod.ai/v2/c7h5q3np80boas"
      - key: RUNPOD_API_KEY
        value: "rpa_MX9WUXA0PD233NF7IDIPGQ9QMPV8ENYNIHMMCC520yo0az"
