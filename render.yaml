# Render Blueprint - FORGE API
# Database: Neon PostgreSQL
# Redis: Upstash Redis (via Fly.io)
# Inference: Fireworks.ai (Qwen3 Coder 480B)

services:
  # FastAPI Backend
  - type: web
    name: forge-api
    runtime: docker
    plan: starter
    region: oregon
    rootDir: api
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # Neon PostgreSQL
      - key: DATABASE_URL
        value: "postgresql://neondb_owner:npg_zTMpO0kKBn5h@ep-gentle-cake-ais3bl75-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require"
      # Fly.io Upstash Redis
      - key: REDIS_URL
        value: "rediss://default:dc66d5b7275b48458d5a51ce9572584f@fly-forge-redis-prod.upstash.io:6379"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "*"
      - key: STRIPE_SECRET_KEY
        value: "placeholder"
      - key: STRIPE_WEBHOOK_SECRET
        value: "placeholder"
      - key: STRIPE_PRICE_STARTER
        value: "placeholder"
      - key: STRIPE_PRICE_PRO
        value: "placeholder"
      - key: STRIPE_PRICE_ENTERPRISE
        value: "placeholder"
      # Fireworks.ai Inference - Llama 3.3 70B ($0.90/1M tokens, open source)
      - key: INFERENCE_URL
        value: "https://api.fireworks.ai/inference/v1"
      - key: FIREWORKS_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: INFERENCE_MODEL
        value: "accounts/fireworks/models/llama-v3p3-70b-instruct"
