# FORGE Render Blueprint
# Deploy with: render blueprint apply

services:
  # Frontend (Next.js)
  - type: web
    name: forge-frontend
    env: node
    region: oregon
    plan: starter
    buildCommand: cd web && npm install && npm run build
    startCommand: cd web && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://api.forge.ai
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
    autoDeploy: true
    branch: main

  # API Server (FastAPI)
  - type: web
    name: forge-api
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: forge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: forge-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
      - key: INFERENCE_URL
        sync: false
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: https://forge.ai,https://www.forge.ai
    healthCheckPath: /health
    autoDeploy: true
    branch: main

databases:
  - name: forge-db
    plan: starter
    region: oregon
    postgresMajorVersion: 15
    ipAllowList: []

  - type: redis
    name: forge-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
